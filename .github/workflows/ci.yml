name: CI — Gally Core Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "gally_core/**"
      - "frontend-explorer/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "gally_core/**"
      - "frontend-explorer/**"
      - ".github/workflows/ci.yml"

jobs:
  sui-move-tests:
    name: Sui Move Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Sui CLI
        run: |
          # Step 1: Install suiup (official Sui version manager)
          # suiup installs to ~/.local/bin/
          curl -sSfL https://raw.githubusercontent.com/MystenLabs/suiup/main/install.sh | sh

          # suiup and sui both live in ~/.local/bin/
          export PATH="${HOME}/.local/bin:${PATH}"

          # Step 2: Install Sui via suiup
          suiup install sui@mainnet

          # Persist PATH for subsequent steps
          echo "${HOME}/.local/bin" >> $GITHUB_PATH

          # Verify install succeeded in this same step
          sui --version

      - name: Build gally_core
        working-directory: gally_core
        run: sui move build

      - name: Run gally_core tests
        working-directory: gally_core
        run: sui move test

  frontend-tests:
    name: Frontend Typecheck, Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        working-directory: frontend-explorer
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: frontend-explorer
        run: pnpm typecheck

      - name: Lint
        working-directory: frontend-explorer
        run: pnpm lint

      - name: Unit tests (Vitest)
        working-directory: frontend-explorer
        run: pnpm test
