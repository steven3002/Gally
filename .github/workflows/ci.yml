name: CI — Gally Core Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "gally_core/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "gally_core/**"
      - ".github/workflows/ci.yml"

jobs:
  sui-move-tests:
    name: Sui Move Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Sui CLI
        run: |
          # Step 1: Install suiup (official Sui version manager)
          curl -sSfL https://raw.githubusercontent.com/MystenLabs/suiup/main/install.sh | sh

          # Add suiup/sui to PATH for subsequent steps
          echo "${HOME}/.sui/bin" >> $GITHUB_PATH
          export PATH="${HOME}/.sui/bin:${PATH}"

          # Step 2: Install Sui via suiup
          suiup install sui@mainnet

      - name: Verify Sui version
        run: sui --version

      - name: Build gally_core
        working-directory: gally_core
        run: sui move build

      - name: Run gally_core tests
        working-directory: gally_core
        run: sui move test
